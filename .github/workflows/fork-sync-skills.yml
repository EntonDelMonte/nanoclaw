name: Sync upstream & merge-forward skill branches

on:
  # Triggered by upstream repo via repository_dispatch
  repository_dispatch:
    types: [upstream-main-updated]
  # Fallback: run on a schedule in case dispatch isn't configured
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  # Also run when fork's main is pushed directly
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fork-sync
  cancel-in-progress: true

jobs:
  sync-and-merge:
    if: github.repository != 'qwibitai/nanoclaw'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream main
        id: sync
        run: |
          # Add upstream remote
          git remote add upstream https://github.com/qwibitai/nanoclaw.git
          git fetch upstream main

          # Check if upstream has new commits
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date with upstream main."
            echo "synced=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Attempt merge upstream main into fork's main
          if git merge upstream/main --no-edit; then
            MERGED=true
          else
            # Auto-resolve known conflict patterns:
            # package-lock.json: always take ours (fork manages its own lockfile)
            if git diff --name-only --diff-filter=U | grep -q "package-lock.json"; then
              git checkout --ours package-lock.json
              git add package-lock.json
            fi

            # For any remaining unresolved files, abort and report
            if git diff --name-only --diff-filter=U | grep -qv "package-lock.json"; then
              CONFLICTS=$(git diff --name-only --diff-filter=U | grep -v "package-lock.json" | tr '\n' ' ')
              echo "::error::Merge conflict in: $CONFLICTS — manual resolution required"
              git merge --abort
              echo "synced=false" >> "$GITHUB_OUTPUT"
              echo "sync_failed=true" >> "$GITHUB_OUTPUT"
              echo "conflicts=$CONFLICTS" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # All conflicts were auto-resolved
            git commit --no-edit
            MERGED=true
          fi

          # Validate build
          npm ci
          if ! npm run build; then
            echo "::error::Build failed after merging upstream/main"
            git reset --hard "origin/main"
            echo "synced=false" >> "$GITHUB_OUTPUT"
            echo "sync_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! npm test 2>/dev/null; then
            echo "::error::Tests failed after merging upstream/main"
            git reset --hard "origin/main"
            echo "synced=false" >> "$GITHUB_OUTPUT"
            echo "sync_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git push origin main
          echo "synced=true" >> "$GITHUB_OUTPUT"

      - name: Merge main into skill branches
        id: merge
        run: |
          # Re-fetch to pick up any changes pushed since job start
          git fetch origin

          FAILED=""
          SUCCEEDED=""

          # List all remote skill branches
          SKILL_BRANCHES=$(git branch -r --list 'origin/skill/*' | sed 's|origin/||' | xargs)

          if [ -z "$SKILL_BRANCHES" ]; then
            echo "No skill branches found."
            exit 0
          fi

          for BRANCH in $SKILL_BRANCHES; do
            SKILL_NAME=$(echo "$BRANCH" | sed 's|skill/||')
            echo ""
            echo "=== Processing $BRANCH ==="

            git checkout -B "$BRANCH" "origin/$BRANCH"

            if ! git merge main --no-edit; then
              echo "::warning::Merge conflict in $BRANCH"
              git merge --abort
              FAILED="$FAILED $SKILL_NAME"
              continue
            fi

            # Check if there's anything new to push
            if git diff --quiet "origin/$BRANCH"; then
              echo "$BRANCH is already up to date with main."
              SUCCEEDED="$SUCCEEDED $SKILL_NAME"
              continue
            fi

            npm ci

            if ! npm run build; then
              echo "::warning::Build failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $SKILL_NAME"
              continue
            fi

            if ! npm test 2>/dev/null; then
              echo "::warning::Tests failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $SKILL_NAME"
              continue
            fi

            git push origin "$BRANCH"
            SUCCEEDED="$SUCCEEDED $SKILL_NAME"
            echo "$BRANCH merged and pushed successfully."
          done

          echo ""
          echo "=== Results ==="
          echo "Succeeded: $SUCCEEDED"
          echo "Failed: $FAILED"

          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "succeeded=$SUCCEEDED" >> "$GITHUB_OUTPUT"

      - name: Report sync failure in job summary
        if: steps.sync.outputs.sync_failed == 'true'
        run: |
          CONFLICTS="${{ steps.sync.outputs.conflicts }}"
          echo "## Upstream sync failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$CONFLICTS" ]; then
            echo "Merge conflicts in: \`$CONFLICTS\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Build or test failure after merging upstream/main." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**To resolve manually:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo 'git fetch upstream main' >> "$GITHUB_STEP_SUMMARY"
          echo 'git merge upstream/main' >> "$GITHUB_STEP_SUMMARY"
          echo '# resolve conflicts' >> "$GITHUB_STEP_SUMMARY"
          echo 'npm run build && npm test' >> "$GITHUB_STEP_SUMMARY"
          echo 'git push' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Report failed skill merges in job summary
        if: steps.merge.outputs.failed != ''
        run: |
          FAILED="${{ steps.merge.outputs.failed }}"
          echo "## Skill branch merge-forward failures" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for SKILL in $FAILED; do
            echo "- \`skill/$SKILL\`" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Resolve manually: \`git checkout skill/NAME && git merge main\`" >> "$GITHUB_STEP_SUMMARY"
